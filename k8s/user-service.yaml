apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: crpi-pik0sdrslhyp68pn.cn-hangzhou.personal.cr.aliyuncs.com/qwoyu/user-service:v1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 18020
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - port: 18020
      targetPort: 18020
